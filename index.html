
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leo 💜 Ingrid</title>
 
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Sacramento&display=swap" rel="stylesheet">
 
  <style>
    :root {
      --violet: #9b4dca;
      --violet-light: #c084fc;
      --violet-glow: #a855f7;
      --violet-dim: rgba(168, 85, 247, 0.18);
      --bg-deep: #0a0010;
      --bg-mid: #160025;
      --text: #f0e6ff;
      --text-dim: rgba(240, 230, 255, 0.6);
    }
 
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      text-align: center;
      padding: 28px 20px;
      position: relative;
      gap: 0;
    }
 
    /* ─── STARFIELD ─── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
 
    /* ─── GLOW ORB ─── */
    .orb {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(138, 43, 226, 0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: orb-breathe 8s ease-in-out infinite;
    }
 
    @keyframes orb-breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }
 
    /* ─── FLOATING HEARTS ─── */
    .heart {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      animation: float-up linear forwards;
      z-index: 1;
      filter: drop-shadow(0 0 6px #a855f7);
    }
 
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1) rotate(0deg);   opacity: 0.9; }
      50%  { opacity: 0.6; transform: translateY(-50vh) scale(0.8) rotate(15deg); }
      100% { transform: translateY(-105vh) scale(0) rotate(30deg); opacity: 0; }
    }
 
    /* ─── WRAPPER ─── */
    .wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
      max-width: 420px;
    }
 
    /* ─── NAME ─── */
    .names {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 4vw, 1.2rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--violet-light);
      opacity: 0;
      animation: fade-in 1.2s 0.3s forwards;
    }
 
    /* ─── CAROUSEL ─── */
    .carrossel-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      opacity: 0;
      animation: fade-in 1.2s 0.6s forwards;
    }
 
    .carrossel-container {
      width: 260px;
      height: 260px;
      overflow: hidden;
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(168, 85, 247, 0.3),
        0 0 40px rgba(168, 85, 247, 0.3),
        0 0 80px rgba(168, 85, 247, 0.1);
      touch-action: pan-y;
    }
 
    .carrossel {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
    }
 
    .carrossel img {
      width: 260px;
      height: 260px;
      border-radius: 24px;
      object-fit: cover;
      flex-shrink: 0;
    }
 
    .seta {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.4rem;
      color: rgba(255,255,255,0.85);
      background: rgba(10, 0, 20, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      z-index: 5;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }
 
    .seta:hover {
      background: rgba(168, 85, 247, 0.5);
      border-color: var(--violet-light);
      transform: translateY(-50%) scale(1.15);
    }
 
    .seta.left  { left:  -18px; }
    .seta.right { right: -18px; }
 
    /* dots */
    .dots {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-top: 10px;
    }
 
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.3);
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }
 
    .dot.active {
      background: var(--violet-light);
      transform: scale(1.4);
    }
 
    /* ─── HEADING ─── */
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--text);
      opacity: 0;
      animation: fade-in 1.2s 0.9s forwards;
    }
 
    /* ─── COUNTER ─── */
    #contador {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 3vw, 1rem);
      font-style: italic;
      color: var(--violet-light);
      background: rgba(168, 85, 247, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.25);
      padding: 12px 22px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      line-height: 1.5;
      opacity: 0;
      animation: fade-in 1.2s 1.1s forwards;
      letter-spacing: 0.02em;
    }
 
    /* ─── PHRASE ─── */
    p.frase {
      font-family: 'Sacramento', cursive;
      font-size: clamp(1.3rem, 5vw, 1.6rem);
      color: rgba(240, 230, 255, 0.88);
      max-width: 340px;
      line-height: 1.5;
      opacity: 0;
      animation: fade-in 1.2s 1.3s forwards;
    }
 
    /* ─── DIVIDER ─── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet-glow), transparent);
      opacity: 0;
      animation: fade-in 1.2s 1.5s forwards;
    }
 
    /* ─── BUTTONS ─── */
    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      background: transparent;
      border: 1px solid rgba(168, 85, 247, 0.5);
      padding: 12px 30px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.2s;
      backdrop-filter: blur(6px);
      position: relative;
      overflow: hidden;
    }
 
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(168,85,247,0));
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 50px;
    }
 
    .btn:hover::before { opacity: 1; }
 
    .btn:hover {
      border-color: var(--violet-light);
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.45);
      transform: translateY(-2px);
    }
 
    .btn:active { transform: translateY(0); }
 
    .btn-top {
      z-index: 10;
      opacity: 0;
      animation: fade-in 1s 2s forwards;
      margin-bottom: 10px;
    }
 
    .btn-bottom {
      z-index: 10;
      opacity: 0;
      animation: fade-in 1s 2s forwards;
      margin-top: 6px;
    }
 
    /* ─── ANIMATIONS ─── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    audio { display: none; }
 
    /* ─── MODAL SENHA ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 0, 15, 0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
 
    .modal-overlay.show {
      display: flex;
    }
 
    .modal-box {
      background: rgba(22, 0, 37, 0.95);
      border: 1px solid rgba(168, 85, 247, 0.35);
      border-radius: 20px;
      padding: 36px 32px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      box-shadow: 0 0 60px rgba(168, 85, 247, 0.2);
      animation: modal-appear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
 
    @keyframes modal-appear {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
 
    .modal-box h2 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--violet-light);
    }
 
    .modal-box input {
      background: rgba(168, 85, 247, 0.06);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 50px;
      padding: 12px 20px;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--text);
      text-align: center;
      letter-spacing: 0.25em;
      outline: none;
      width: 100%;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
 
    .modal-box input:focus {
      border-color: var(--violet-light);
      box-shadow: 0 0 18px rgba(168, 85, 247, 0.25);
    }
 
    .modal-errou {
      font-family: 'Sacramento', cursive;
      font-size: 1.15rem;
      color: #ff80ab;
      min-height: 1.5rem;
    }
 
    .modal-btns {
      display: flex;
      gap: 12px;
    }
 
    .btn-cancelar {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 22px;
      border-radius: 50px;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
    }
 
    .btn-cancelar:hover {
      border-color: rgba(255,255,255,0.35);
      color: var(--text);
    }
  </style>
</head>
<body>
 
  <canvas id="stars-canvas"></canvas>
  <div class="orb"></div>
 
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0;width:100%;">
  <button id="iniciar" class="btn btn-top">Clique aqui 💜</button>
 
  <div class="wrapper">
    <div class="names">Leo &nbsp;💜&nbsp; Ingrid</div>
 
    <div class="carrossel-wrap">
      <div class="carrossel-container" id="container">
        <div class="carrossel" id="carrossel"></div>
        <div class="seta left">&#10094;</div>
        <div class="seta right">&#10095;</div>
      </div>
      <div class="dots" id="dots"></div>
    </div>
 
    <h1>Eu te amo há:</h1>
    <div id="contador">Carregando...</div>
 
    <div class="divider"></div>
 
    <p class="frase">Conhecer você foi a forma mais linda que o universo sorriu pra mim. 💜</p>
  </div>
 
  <button id="verHistoria" class="btn btn-bottom">Nossa história 💜</button>
  </div>
 
  <!-- Modal senha -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <h2>Nossa história 💜</h2>
      <input type="password" id="senha-input" maxlength="10" placeholder="••••••" inputmode="numeric"/>
      <div class="modal-errou" id="modal-erro"></div>
      <div class="modal-btns">
        <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
        <button class="btn" id="btn-confirmar">Entrar 💜</button>
      </div>
    </div>
  </div>
 
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>
 
  <script>
    /* ── STARFIELD ── */
    (function(){
      const canvas = document.getElementById('stars-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
 
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
 
      function makeStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.2,
            alpha: Math.random(),
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2
          });
        }
      }
 
      function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
          const a = 0.3 + 0.7 * Math.abs(Math.sin(s.phase + t * s.speed));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220, 190, 255, ${a})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
 
      window.addEventListener('resize', () => { resize(); makeStars(160); });
      resize();
      makeStars(160);
      requestAnimationFrame(draw);
    })();
 
    /* ── CAROUSEL ── */
    const imagens = [
      "foto.jpg","foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg",
      "foto5.jpg","foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
    ];
 
    imagens.sort(() => Math.random() - 0.5);
 
    const carrossel = document.getElementById("carrossel");
    const dotsEl    = document.getElementById("dots");
 
    imagens.forEach((src, i) => {
      const img = document.createElement("img");
      img.src = src;
      img.alt = `Foto ${i + 1}`;
      carrossel.appendChild(img);
 
      const dot = document.createElement("div");
      dot.classList.add("dot");
      if (i === 0) dot.classList.add("active");
      dot.addEventListener("click", () => goTo(i));
      dotsEl.appendChild(dot);
    });
 
    const imgs  = document.querySelectorAll(".carrossel img");
    const dots  = document.querySelectorAll(".dot");
    let index   = 0;
    let autoTimer;
 
    function goTo(i) {
      index = (i + imgs.length) % imgs.length;
      carrossel.style.transform = `translateX(${-index * 260}px)`;
      dots.forEach((d, j) => d.classList.toggle("active", j === index));
    }
 
    function next() { goTo(index + 1); }
    function prev() { goTo(index - 1); }
 
    function resetAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(next, 5000);
    }
 
    document.querySelector(".seta.left").onclick  = () => { prev(); resetAuto(); };
    document.querySelector(".seta.right").onclick = () => { next(); resetAuto(); };
 
    resetAuto();
 
    /* touch */
    let startX = 0;
    const cont = document.getElementById("container");
    cont.addEventListener("touchstart", e => { startX = e.touches[0].clientX; });
    cont.addEventListener("touchend",   e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (diff >  50) { next(); resetAuto(); }
      if (diff < -50) { prev(); resetAuto(); }
    });
 
    /* ── COUNTER ── */
    const inicio     = new Date("2023-12-16T00:00:00");
    const contadorEl = document.getElementById("contador");
 
    function plural(v, s, p) { return v === 1 ? `${v} ${s}` : `${v} ${p}`; }
 
    function atualizarContador() {
      const agora = new Date();
      let anos  = agora.getFullYear() - inicio.getFullYear();
      let meses = agora.getMonth()    - inicio.getMonth();
      let dias  = agora.getDate()     - inicio.getDate();
 
      if (dias  < 0) { meses--; dias  += new Date(agora.getFullYear(), agora.getMonth(), 0).getDate(); }
      if (meses < 0) { anos--;  meses += 12; }
 
      const h = agora.getHours(), m = agora.getMinutes(), s = agora.getSeconds();
 
      contadorEl.textContent =
        `${plural(anos,"ano","anos")}, ${plural(meses,"mês","meses")}, ${plural(dias,"dia","dias")}, ` +
        `${plural(h,"hora","horas")}, ${plural(m,"minuto","minutos")} e ${plural(s,"segundo","segundos")}`;
    }
 
    setInterval(atualizarContador, 1000);
    atualizarContador();
 
    /* ── FLOATING HEARTS ── */
    function criarCoracao() {
      const h = document.createElement("div");
      h.classList.add("heart");
      h.textContent = "💜";
      h.style.left              = Math.random() * 100 + "vw";
      h.style.bottom            = "-30px";
      h.style.fontSize          = (Math.random() * 12 + 12) + "px";
      h.style.animationDuration = (Math.random() * 4 + 5) + "s";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 9000);
    }
    setInterval(criarCoracao, 500);
 
    /* ── MUSIC ── */
    const botao  = document.getElementById("iniciar");
    const musica = document.getElementById("musica");
 
    botao.addEventListener("click", () => {
      musica.volume = 0;
      musica.play().catch(() => {});
      botao.style.opacity    = "0";
      botao.style.transform  = "scale(0.8)";
      botao.style.transition = "all 0.5s";
      setTimeout(() => botao.style.display = "none", 500);
 
      let v = 0;
      const fade = setInterval(() => {
        v = Math.min(v + 0.05, 1);
        musica.volume = v;
        if (v >= 1) clearInterval(fade);
      }, 200);
    });
 
    /* ── MODAL SENHA ── */
    const modal       = document.getElementById("modal");
    const senhaInput  = document.getElementById("senha-input");
    const modalErro   = document.getElementById("modal-erro");
 
    document.getElementById("verHistoria").addEventListener("click", () => {
      modal.classList.add("show");
      setTimeout(() => senhaInput.focus(), 100);
    });
 
    document.getElementById("btn-cancelar").addEventListener("click", () => {
      modal.classList.remove("show");
      senhaInput.value = "";
      modalErro.textContent = "";
    });
 
    function confirmar() {
      if (senhaInput.value === "161223") {
        localStorage.setItem("musica", "on");
        window.location.href = "historia.html";
      } else {
        modalErro.textContent = "Senha incorreta 💔";
        senhaInput.value = "";
        senhaInput.style.borderColor = "#ff80ab";
        senhaInput.style.boxShadow   = "0 0 14px rgba(255, 100, 150, 0.35)";
        setTimeout(() => {
          senhaInput.style.borderColor = "";
          senhaInput.style.boxShadow   = "";
          modalErro.textContent = "";
        }, 1800);
      }
    }
 
    document.getElementById("btn-confirmar").addEventListener("click", confirmar);
    senhaInput.addEventListener("keydown", e => { if (e.key === "Enter") confirmar(); });
 
    modal.addEventListener("click", e => {
      if (e.target === modal) {
        modal.classList.remove("show");
        senhaInput.value = "";
        modalErro.textContent = "";
      }
    });
  </script>
</body>
</html>
