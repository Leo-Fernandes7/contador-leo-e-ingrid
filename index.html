<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leo 💜 Ingrid</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #3a004a, #000);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-top: 15px;
    }

    #contador {
      font-size: 1.2rem;
      margin-top: 10px;
      color: #d08fff;
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(168, 89, 247, 0.5);
    }

    p {
      max-width: 350px;
      margin-top: 20px;
      line-height: 1.4;
      font-size: 1.3rem;
      opacity: 0.95;
      font-family: 'Dancing Script', cursive;
    }

    .carrossel-container {
      position: relative;
      width: 240px;
      height: 240px;
      margin-top: 20px;
      overflow: hidden;
      touch-action: pan-y;
    }

    .carrossel {
      display: flex;
      transition: transform 0.5s ease;
    }

    .carrossel img {
      width: 240px;
      height: 240px;
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 0 25px #a959f7;
    }

    .seta {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.2rem;
      color: #fff;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      padding: 8px 15px;
      cursor: pointer;
      user-select: none;
      z-index: 5;
      transition: all 0.3s;
    }

    .seta:hover {
      background: rgba(169, 89, 247, 0.8);
      transform: translateY(-50%) scale(1.2);
    }

    .seta.left { left: -35px; }
    .seta.right { right: -35px; }

    .heart {
      position: fixed;
      color: #a959f7;
      font-size: 22px;
      animation: float 6s linear infinite;
      z-index: 1;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    /* BOTÕES (mesmo estilo) */
    button {
      background: #a959f7;
      color: white;
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 20px #a959f7;
      animation: pulse 1.5s infinite;
      z-index: 2;
    }

    .topo {
      position: fixed;
      top: 55px;
    }

    .baixo {
      position: fixed;
      bottom: 40px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    audio { display: none; }
  </style>
</head>
<body>

  <div class="carrossel-container" id="container">
    <div class="carrossel" id="carrossel"></div>
    <div class="seta left">&#10094;</div>
    <div class="seta right">&#10095;</div>
  </div>

  <h1>Eu te amo há:</h1>
  <div id="contador">Carregando...</div>

  <p>Conhecer você foi a forma mais linda que o universo sorriu pra mim. 💜</p>

  <!-- BOTÕES -->
  <button id="iniciar" class="topo">Clique aqui 💜</button>
  <button id="verHistoria" class="baixo">Nossa história 💜</button>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    const imagens = [
      "foto.jpg",
      "foto1.jpg",
      "foto2.jpg",
      "foto3.jpg",
      "foto4.jpg",
      "foto5.jpg",
      "foto6.jpg",
      "foto7.jpg",
      "foto8.jpg",
      "foto9.jpg",
      "foto10.jpg"
    ];

    imagens.sort(() => Math.random() - 0.5);

    const carrossel = document.getElementById("carrossel");

    imagens.forEach(src => {
      const img = document.createElement("img");
      img.src = src;
      carrossel.appendChild(img);
    });

    const imgs = document.querySelectorAll(".carrossel img");

    const inicio = new Date("2023-12-16T00:00:00");
    const contadorEl = document.getElementById("contador");

    function plural(v, s, p) {
      return v === 1 ? `${v} ${s}` : `${v} ${p}`;
    }

    function atualizarContador() {
      const agora = new Date();
      let anos = agora.getFullYear() - inicio.getFullYear();
      let meses = agora.getMonth() - inicio.getMonth();
      let dias = agora.getDate() - inicio.getDate();

      if (dias < 0) {
        meses--;
        dias += new Date(agora.getFullYear(), agora.getMonth(), 0).getDate();
      }

      if (meses < 0) {
        anos--;
        meses += 12;
      }

      const h = agora.getHours();
      const m = agora.getMinutes();
      const s = agora.getSeconds();

      contadorEl.textContent =
        `${plural(anos,"ano","anos")}, ${plural(meses,"mês","meses")}, ${plural(dias,"dia","dias")}, ` +
        `${plural(h,"hora","horas")}, ${plural(m,"minuto","minutos")} e ${plural(s,"segundo","segundos")}`;
    }

    setInterval(atualizarContador, 1000);
    atualizarContador();

    function criarCoracao() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.textContent = "💜";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = Math.random() * 3 + 3 + "s";
      heart.style.fontSize = Math.random() * 10 + 15 + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(criarCoracao, 400);

    const botao = document.getElementById("iniciar");
    const musica = document.getElementById("musica");

    botao.addEventListener("click", () => {
      musica.volume = 0;
      musica.play();
      botao.style.display = "none";

      let v = 0;
      const fade = setInterval(() => {
        if (v < 1) {
          v += 0.05;
          musica.volume = v;
        } else clearInterval(fade);
      }, 200);
    });

    document.getElementById("verHistoria").addEventListener("click", () => {
      const senha = prompt("Digite a senha 💜");

      if (senha === "161223") {
        localStorage.setItem("musica", "on");
        window.location.href = "historia.html";
      } else {
        alert("Senha incorreta 💔");
      }
    });

    const setaEsq = document.querySelector(".seta.left");
    const setaDir = document.querySelector(".seta.right");
    let index = 0;

    function mostrar(i) {
      carrossel.style.transform = `translateX(${-i * imgs[0].clientWidth}px)`;
    }

    setaEsq.onclick = () => {
      index = (index - 1 + imgs.length) % imgs.length;
      mostrar(index);
    };

    setaDir.onclick = () => {
      index = (index + 1) % imgs.length;
      mostrar(index);
    };

    setInterval(() => {
      index = (index + 1) % imgs.length;
      mostrar(index);
    }, 5000);

    let startX = 0;

    const container = document.getElementById("container");

    container.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
    });

    container.addEventListener("touchend", e => {
      let endX = e.changedTouches[0].clientX;
      let diff = startX - endX;

      if (diff > 50) {
        index = (index + 1) % imgs.length;
        mostrar(index);
      } else if (diff < -50) {
        index = (index - 1 + imgs.length) % imgs.length;
        mostrar(index);
      }
    });
  </script>
</body>
</html>
