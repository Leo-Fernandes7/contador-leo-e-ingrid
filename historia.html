<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História 💜</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at top, #3a004a, #000);
      color: white;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      line-height: 1.6;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #a959f7;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Nossa história 💜</h1>

    <p>
      Tudo começou de um jeito simples, mas desde o primeiro momento eu já sabia
      que tinha algo diferente em você.
      <br><br>
      Cada conversa, cada momento, cada risada... tudo foi construindo algo
      que hoje é uma das partes mais importantes da minha vida.
      <br><br>
      E isso é só o começo da nossa história. 💜
    </p>

    <button onclick="window.history.back()">Voltar</button>
  </div>

</body>
</html>
